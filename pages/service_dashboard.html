<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="/styles/service_dashboard.css">
</head>

<body class="light-mode">
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h4>Vehicle Service</h4>
            </div>

            <ul class="sidebar-menu">
                <li class="menu-item active" data-view="active">
                    <i class="bi bi-car-front-fill"></i>
                    Active Bookings
                </li>

                <li class="menu-item" data-view="history">
                    <i class="bi bi-clock-history"></i>
                    Booking History
                </li>
            </ul>
        </aside>


        <main class="main-content">
            <nav class="navbar navbar-expand-lg shadow-sm rounded mb-4">
                <div class="container-fluid">
                    <span class="navbar-brand fw-bold">Service Dashboard</span>

                    <div class="d-flex align-items-center gap-3">
                        <span id="welcomeSupport"></span>
                            <button class="btn btn-outline-dark" id="themeBtn">
                                <i class="bi bi-moon-stars-fill"></i>
                            </button>

                        <button class="btn btn-danger" id="logoutBtn">Logout</button>
                    </div>
                </div>
            </nav>


            <div class="row g-4 mb-4">
                <div class="col-lg-3 col-md-6">
                    <div class="stat-card">
                        <h6>Total</h6>
                        <h2 id="totalBookings">0</h2>
                    </div>
                </div>

                <div class="col-lg-3 col-md-6">
                    <div class="stat-card">
                        <h6>Pending</h6>
                        <h2 id="pendingBookings">0</h2>
                    </div>
                </div>

                <div class="col-lg-3 col-md-6">
                    <div class="stat-card">
                        <h6>Accepted</h6>
                        <h2 id="acceptedBookings">0</h2>
                    </div>
                </div>

                <div class="col-lg-3 col-md-6">
                    <div class="stat-card">
                        <h6>Completed</h6>
                        <h2 id="completedBookings">0</h2>
                    </div>
                </div>
            </div>

            <!-- Filters -->

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-lg-4">
                            <input type="text" class="form-control" id="searchBooking" placeholder="Search Booking...">
                        </div>

                        <div class="col-lg-4">

                            <select class="form-select"
                                id="sortBookings">

                                <option value="latest">
                                    Latest First
                                </option>

                                <option value="oldest">
                                    Oldest First
                                </option>

                                <option value="customer">
                                    Customer Name
                                </option>

                            </select>

                        </div>

                        <div class="col-lg-4">

                            <select class="form-select"
                                id="statusFilter">

                                <option value="all">
                                    All Status
                                </option>

                                <option value="Pending">
                                    Pending
                                </option>

                                <option value="Accepted">
                                    Accepted
                                </option>

                                <option value="Completed">
                                    Completed
                                </option>

                                <option value="Rejected">
                                    Rejected
                                </option>

                            </select>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Cards -->

            <div class="row g-4"
                id="bookingContainer">

            </div>

        </main>

    </div>

    <!-- ================= BOOKING DETAILS ================= -->

    <div class="modal fade"
        id="bookingModal">

        <div class="modal-dialog modal-lg">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">

                        Booking Details

                    </h5>

                    <button class="btn-close"
                        data-bs-dismiss="modal">

                    </button>

                </div>

                <div class="modal-body"
                    id="bookingDetails">

                </div>

            </div>

        </div>

    </div>

    <!-- ================= REJECT MODAL ================= -->

    <div class="modal fade"
        id="rejectModal">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">

                        Reject Booking

                    </h5>

                    <button class="btn-close"
                        data-bs-dismiss="modal">

                    </button>

                </div>

                <div class="modal-body">

                    <input type="hidden"
                        id="rejectBookingId">

                    <div class="mb-3">

                        <label class="form-label">

                            Reason

                        </label>

                        <textarea class="form-control"
                            id="rejectReason"
                            rows="3"></textarea>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Suggested Date

                        </label>

                        <input type="date"
                            class="form-control"
                            id="suggestedDate">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Suggested Time

                        </label>

                        <input type="time"
                            class="form-control"
                            id="suggestedTime">

                    </div>

                </div>

                <div class="modal-footer">

                    <button class="btn btn-secondary"
                        data-bs-dismiss="modal">

                        Cancel

                    </button>

                    <button class="btn btn-danger"
                        id="confirmReject">

                        Reject Booking

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->

    <script src="/scripts/service_dashboard.js"></script>

</body>

</html>
