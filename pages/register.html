<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="../styles/register.css">

</head>
<body class="light-mode">
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold fs-2 gap-2 px-4 " href="../pages/index.html">Vehicle Service</a>
            <div>
                <a href="../pages/login.html" class="btn btn-outline-dark btn-custom fw-bold py-2">Login</a>

                <button class="btn btn-dark py-2" id="themeBtn">
                    <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-4">
                        <h2 class="mb-3 text-center">Register</h2>

                        <form id="registrationForm">

                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
                                <small id="nameError" class="text-danger"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email Id</label>
                                <input type="email" id="email" class="form-control" placeholder="Enter you mail id" required>
                                <small id="emailError" class="text-danger"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" id="phone" class="form-control" placeholder="Enter your number" required>
                                <small id="phoneError" class="text-danger"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Address</label>
                                <textarea id="address" class="form-control" rows="3" placeholder="Enter your address" required></textarea>
                                <small id="addressError" class="text-danger"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <div class="input-group">
                                    <input type="password" id="password" class="form-control">
                                        <span class="input-group-text" id="togglePassword">
                                            <i class="bi bi-eye-fill"></i>
                                        </span>
                                </div>
                                 <small id="passwordError" class="text-danger"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Confirm Password</label>
                                <div class="input-group">
                                    <input type="password" id="confirmPassword" class="form-control">
                                        <span class="input-group-text" id="toggleConfirmPassword">
                                            <i class="bi bi-eye-fill"></i>
                                        </span>
                                </div>
                                <small id="confirmPasswordError" class="text-danger"></small>                            
                            </div>

                            <button id="registerBtn" class="btn btn-dark w-100">Register</button>
                            <p class="text-center mt-2">Already have an account?
                                <a class="text-dark" href="../pages/login.html">Login</a>
                            </p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../scripts/register.js"></script>

</body>
</html>
