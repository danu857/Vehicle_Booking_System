<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="/styles/login.css">
</head>
<body class="light-mode">
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold fs-2 gap-2 px-4 " href="/pages/index.html">Vehicle Service</a>
            <div>
                <a href="/pages/register.html" class="btn btn-outline-dark py-2">Register</a>

                <button class="btn btn-dark" id="themeBtn">
                    <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
                </button>
            </div>
        </div>
    </nav>    

    <div class="container-fluid">
        <div class="row mt-5">
            <div class="col-md-5">
                <div class="card shadow-lg mt-5">
                    <div class="card-body p-4">
                        <h2 class="text-center">Login</h2>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label>Email</label>
                                <input type="email" id="email" class="form-control" placeholder="Enter Email id" required>
                                <small id="emailError" class="text-danger"></small>
                            </div>

                            <div class="mb-3">
                                <label>Password</label>
                                <div class="input-group">
                                    <input type="password" id="password" class="form-control" placeholder="Enter you password">
                                        <span class="input-group-text" id="togglePassword">
                                            <i class="bi bi-eye-fill"></i>
                                        </span>
                                </div>
                                 <small id="passwordError" class="text-danger"></small>
                            </div>

                            <button class="btn btn-primary w-100" id="loginBtn">Login</button>
                            <p class="text-center mt-2">Don't have an account? Create One!
                                <a class="text-dark" href="/pages/register.html">Register</a>
                            </p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/scripts/login.js"></script>
</body>
</html>
