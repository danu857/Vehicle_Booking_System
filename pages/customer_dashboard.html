<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="../styles/customer_dashboard.css">
</head>

<body class="light-mode">
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark custom py-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold fs-3">Vehicle Service</a>

            <div class="d-flex align-items-center">
                <div class="d-flex align-items-center me-4">
                    <i class="bi bi-person-circle text-white fs-4 me-2"></i>

                    <span id="welcomeUser" class="text-white fw-bold"></span>

                    <button
                        class="btn btn-outline-light btn-sm ms-3"
                        data-bs-toggle="offcanvas"
                        data-bs-target="#profileCanvas">

                        <i class="bi bi-person-vcard me-1"></i>
                        View Profile
                    </button>
                </div>

                <button class="btn btn-dark me-2 py-2" id="themeBtn">
                    <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
                </button>

                <button class="btn btn-danger py-2" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <!-- COUNTER CARDS -->
    <div class="container py-5">
        <div class="row g-3 mb-5">
            <div class="col-lg-3 col-md-6">
                <div class="card stat-card text-center">
                    <div class="card-body">
                        <i class="bi bi-card-list fs-3"></i>
                        <h5>Total</h5>
                        <h2 id="totalBookings">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-lg-3 col-md-6">
                <div class="card stat-card text-center">
                    <div class="card-body">
                        <i class="bi bi-hourglass-split fs-3"></i>
                        <h5>Pending</h5>
                        <h2 id="pendingBookings">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-lg-3 col-md-6">
                <div class="card stat-card text-center">
                    <div class="card-body">
                        <i class="bi bi-check-circle-fill fs-3"></i>
                        <h5>Accepted</h5>
                        <h2 id="acceptedBookings">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-lg-3 col-md-6">
                <div class="card stat-card text-center">
                    <div class="card-body ">
                        <i class="bi bi-check2-all ms-1 fs-3"></i>
                        <h5>Completed</h5>
                        <h2 id="completedBookings">0</h2>
                    </div>
                </div>
            </div>
        </div>

<!-- BOOKING AND DISPLAY BUTTONS -->
        <div class="booking-nav mb-5">
            <button id="activeTab" class="booking-tab">
                <i class="bi bi-clock-history"></i>Active Bookings
            </button>

            <button id="historyTab" class="booking-tab">
                <i class="bi bi-check2-all me-2"></i>Booking History
            </button>

            <button class="btn btn-primary" id="bookServiceBtn" data-bs-toggle="modal" data-bs-target="#bookingModal">
                <i class="bi bi-plus-circle me-2"></i>Book Service
            </button>
        </div>

<!-- SEARCHING AND TOTAL CALCULATION -->
        <div class="row g-3 align-items-center bg-white rounded-4 py-3 mb-4">

            <div class="col-lg-4 mx-5">
                <input type="text" id="searchBooking" class="form-control" placeholder="Search by Service / Vehicle">
            </div>

            <div class="col-lg-3">
                <div class="card summary-card text-center">
                    <div class="card-body py-3">
                        <small>Total Services</small>
                        <h4 id="totalServices" class="mb-0">0</h4>
                    </div>
                </div>
            </div>

            <div class="col-lg-3">
                <div class="card summary-card text-center">
                    <div class="card-body py-3">
                        <small>Total Amount</small>
                        <h4 id="totalAmount" class="mb-0">₹0</h4>
                    </div>
                </div>
            </div>

        </div>

        <div class="row g-4" id="bookingContainer"></div>
    </div>

    <!-- BOOKING SERVICE -->
    <div class="modal fade" id="bookingModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="bookingForm">
                    <div class="modal-header">
                        <h5 class="modal-title">Book Service Now</h5>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        <input type="hidden" id="bookingId">
                            <div class="mb-3">
                                <label class="form-label">Service</label>
                                    <select id="service" class="form-select">
                                        <option value="">Select Service</option>
                                        <option value="General Service" data-price="1500">General Service</option>
                                        <option value="Oil Change" data-price="1000">Oil Change</option>
                                        <option value="Car Wash" data-price="700">Car Wash</option>
                                        <option value="Wheel Alignment" data-price="800">Wheel Alignment</option>
                                        <option value="Brake Services" data-price="1200">Brake Services</option>
                                        <option value="AC Service" data-price="1800">AC Service</option>
                                    </select>
                                <small id="serviceError" class="text-danger"></small>
                            </div>

                            <div class="mb-3">
                                <label>Vehicle Number</label>
                                    <input type="text" id="vehicleNumber" class="form-control">
                                        <small id="vehicleNumberError" class="text-danger"></small>
                            </div>

                            <div class="mb-3">
                                <label>Vehicle Type</label>
                                    <select id="vehicleType" class="form-select">
                                        <option value="">Select Type</option>
                                        <option>Bike</option>
                                        <option>Car</option>
                                    </select>
                                <small id="vehicleTypeError" class="text-danger"></small>
                            </div>

                            <div class="mb-3">
                                <label>Booking Date</label>
                                    <input type="datetime-local" id="bookingDate" class="form-control">
                                        <small id="bookingDateError" class="text-danger"></small>
                            </div>

                            <div class="mb-3">
                                <label>Amount</label>
                                    <input type="text" id="amount" class="form-control" readonly>
                            </div>
                    </div>

                    <div class="modal-footer">
                        <button type="submit" id="saveBookingBtn" class="btn btn-success">
                            Book Service
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <div class="modal fade" id="detailsModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Booking Details</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body" id="detailsBody"></div>

                <div class="modal-footer" id="detailsFooter"></div>
            </div>
        </div>
    </div>

<!-- PROFILE -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="profileCanvas">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">
                <i class="bi bi-person-circle me-2"></i>
                My Profile
            </h5>

            <button class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body">
            <div class="text-center mb-4">
                <i class="bi bi-person-circle" style="font-size:50px;color:#000;"></i>
                <h4 class="mt-2" id="profileName"></h4>
                <span class="badge bg-success">Customer</span>
            </div>

            <hr>

            <div class="mb-3">
                <label class="fw-bold">Name:</label>
                <span id="profileFullName"></span>
            </div>

            <div class="mb-3">
                <label class="fw-bold">Email:</label>
                <span id="profileEmail"></span>
            </div>

            <div class="mb-3">
                <label class="fw-bold">Phone:</label>
                <span id="profilePhone"></span>
            </div>

            <div class="mb-3">
                <label class="fw-bold">User ID:</label>
                <span id="profileId"></span>
            </div>

            <div class="mb-3">
                <label class="fw-bold">Total Bookings:</label>
                <span id="profileBookings"></span>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="../scripts/customer_dashboard.js"></script>
</body>
</html>
