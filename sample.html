<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="/styles/customer_dashboard.css">
</head>

<body class="light-mode">

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">

        <div class="container-fluid">

            <a class="navbar-brand fw-bold fs-3">
                Vehicle Service
            </a>

            <div class="d-flex align-items-center gap-3">

                <span id="welcomeUser" class="text-white fw-bold"></span>

                <button class="btn btn-dark" id="themeBtn">
                    <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
                </button>

                <button class="btn btn-danger" id="logoutBtn">
                    Logout
                </button>

            </div>

        </div>

    </nav>

    <div class="container py-4">

        <!-- Statistics -->

        <div class="row g-3 mb-4">

            <div class="col-md-3">
                <div class="card stat-card text-center">
                    <div class="card-body">
                        <h5>Total</h5>
                        <h2 id="totalBookings">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card stat-card text-center">
                    <div class="card-body">
                        <h5>Pending</h5>
                        <h2 id="pendingBookings">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card stat-card text-center">
                    <div class="card-body">
                        <h5>Accepted</h5>
                        <h2 id="acceptedBookings">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card stat-card text-center">
                    <div class="card-body">
                        <h5>Completed</h5>
                        <h2 id="completedBookings">0</h2>
                    </div>
                </div>
            </div>

        </div>

        <!-- Book Service -->

        <div class="d-flex justify-content-end mb-4">

            <button
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#bookingModal">

                <i class="bi bi-plus-circle"></i>
                Book Service

            </button>

        </div>

        <!-- Active Bookings -->

        <h3 class="mb-3">
            Active Bookings
        </h3>

        <div class="row g-4" id="bookingContainer">

        </div>

        <!-- History -->

        <h3 class="mt-5 mb-3">
            Booking History
        </h3>

        <div class="row g-4" id="historyContainer">

        </div>

    </div>

    <!-- Booking Modal -->

    <div class="modal fade" id="bookingModal">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Book Service
                    </h5>

                    <button
                        class="btn-close"
                        data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <input type="hidden" id="bookingId">

                    <div class="mb-3">

                        <label>Service</label>

                        <select id="service" class="form-select">

                            <option value="">
                                Select Service
                            </option>

                            <option value="General Service" data-price="1500">
                                General Service
                            </option>

                            <option value="Oil Change" data-price="1000">
                                Oil Change
                            </option>

                            <option value="Car Wash" data-price="500">
                                Car Wash
                            </option>

                        </select>

                        <small id="serviceError" class="text-danger"></small>

                    </div>

                    <div class="mb-3">

                        <label>Vehicle Number</label>

                        <input
                            type="text"
                            id="vehicleNumber"
                            class="form-control">

                        <small id="vehicleNumberError"
                            class="text-danger"></small>

                    </div>

                    <div class="mb-3">

                        <label>Vehicle Type</label>

                        <select
                            id="vehicleType"
                            class="form-select">

                            <option value="">
                                Select Type
                            </option>

                            <option>Bike</option>
                            <option>Car</option>
                            <option>SUV</option>

                        </select>

                        <small id="vehicleTypeError"
                            class="text-danger"></small>

                    </div>

                    <div class="mb-3">

                        <label>Date</label>

                        <input
                            type="date"
                            id="bookingDate"
                            class="form-control">

                        <small id="bookingDateError"
                            class="text-danger"></small>

                    </div>

                    <div class="mb-3">

                        <label>Amount</label>

                        <input
                            type="text"
                            id="amount"
                            class="form-control"
                            readonly>

                    </div>

                </div>

                <div class="modal-footer">

                    <button
                        class="btn btn-success"
                        id="saveBookingBtn">

                        Save

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/scripts/customer_dashboard.js"></script>

</body>

</html>
